# PhysMaster Configs
llm:
  base_url: "Your Base URL"
  api_key: "Your Api Key"
  model: "gpt-5"

# Basics
pipeline:
  query_file: "instructions/test.txt"
  output_path: "outputs"
  max_rounds: 10

# Clarifier settings
clarifier:
  max_key_concpets: 5

# skills settings
skills:
  enabled: true
  roots:
    - "LANDAU/skills"

# LANDAU settings
landau:
  library_enabled: false
  library: "LANDAU/library"

  # Library MCP configuration
  library_config:
    mcp_url: "http://127.0.0.1:8002/mcp"  # MCP server endpoint
    search_region: "us"
    search_lang: "en"
    parse_model: "DeepSeek/DeepSeek-V3-0324"

  workflow_enabled: false
  workflow: "LANDAU/workflow"

# visualization settings
visualization:
  enabled: true
